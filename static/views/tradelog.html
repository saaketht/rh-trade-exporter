<h1>Trade Log</h1>
<p class="page-sub">All trades with sorting, filtering, and journal notes</p>

<div class="log-controls">
  <div class="tabs" style="margin-bottom:0" id="log-view-tabs">
    <div class="tab active" data-mode="trades">Trades</div>
    <div class="tab" data-mode="daily">Daily</div>
  </div>
  <select id="log-filter">
    <option value="">All Trades</option>
    <option value="SPY" selected>SPY Only</option>
    <option value="OTHER">Other Symbols</option>
  </select>
  <input type="text" id="log-search" placeholder="Search trades..." style="flex:1;max-width:300px">
</div>

<div id="log-grid" style="height:600px;width:100%" class="ag-theme-alpine-dark"></div>

<div class="log-summary" id="log-summary"></div>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@31.0.3/styles/ag-grid.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@31.0.3/styles/ag-theme-alpine.css">
<script src="https://cdn.jsdelivr.net/npm/ag-grid-community@31.0.3/dist/ag-grid-community.min.js"></script>

<style>
.ag-theme-alpine-dark {
  --ag-background-color: #1a1d27;
  --ag-header-background-color: #14161e;
  --ag-odd-row-background-color: #1e2130;
  --ag-row-hover-color: #262938;
  --ag-border-color: #2a2d3a;
  --ag-foreground-color: #e0e0e0;
  --ag-header-foreground-color: #aaa;
  --ag-secondary-foreground-color: #888;
  --ag-font-family: 'Inter', -apple-system, sans-serif;
  --ag-font-size: 12px;
  --ag-row-height: 36px;
  --ag-header-height: 40px;
  border-radius: 12px;
  overflow: hidden;
}
.cell-win { color: #4ade80; }
.cell-loss { color: #f87171; }
.cell-be { color: #fbbf24; }
.notes-cell { cursor: text; }
.notes-cell:hover { background: rgba(129, 140, 248, 0.1) !important; }
</style>

<script>
(async function() {
  const [allTrades, notes] = await Promise.all([
    apiFetch('/api/trades'),
    apiFetch('/api/notes')
  ]);

  // Merge notes into trades
  allTrades.forEach(t => {
    t.note = notes[t.group_id] || '';
  });

  const plStr = v => v == null ? '' : (v >= 0 ? '+$' + Math.abs(v).toLocaleString() : '-$' + Math.abs(v).toLocaleString());
  const pctStr = (a, b) => b > 0 ? (a / b * 100).toFixed(1) + '%' : '—';

  // --- Column definitions ---
  const tradeCols = [
    { field: 'trade_num', headerName: '#', sort: 'asc' },
    { field: 'date', headerName: 'Date' },
    { field: 'day', headerName: 'Day' },
    { field: 'symbol', headerName: 'Symbol' },
    { field: 'type', headerName: 'Type',
      cellClass: p => p.value === 'Put' ? 'cell-win' : '' },
    { field: 'strike', headerName: 'Strike',
      valueFormatter: p => p.value != null ? '$' + p.value : '' },
    { field: 'qty', headerName: 'Qty' },
    { field: 'entry_time', headerName: 'Entry' },
    { field: 'exit_time', headerName: 'Exit' },
    { field: 'hold_time_min', headerName: 'Hold (min)' },
    { field: 'entry_cost', headerName: 'Entry Cost',
      valueFormatter: p => p.value != null ? '$' + Math.abs(p.value) : '' },
    { field: 'risk', headerName: 'Risk',
      valueFormatter: p => p.value != null ? '$' + p.value : '' },
    { field: 'exit_credit', headerName: 'Exit Credit',
      valueFormatter: p => p.value != null ? '$' + p.value : '' },
    { field: 'pl', headerName: 'P/L ($)',
      cellClass: p => p.value > 0 ? 'cell-win' : p.value < 0 ? 'cell-loss' : 'cell-be',
      valueFormatter: p => plStr(p.value) },
    { field: 'pl_pct', headerName: 'P/L %',
      cellClass: p => p.value > 0 ? 'cell-win' : p.value < 0 ? 'cell-loss' : '',
      valueFormatter: p => p.value != null ? p.value.toFixed(1) + '%' : '' },
    { field: 'wl', headerName: 'W/L',
      cellClass: p => p.value === 'WIN' ? 'cell-win' : p.value === 'LOSS' ? 'cell-loss' : 'cell-be' },
    { field: 'vix', headerName: 'VIX' },
    { field: 'delta', headerName: 'Delta',
      valueFormatter: p => p.value != null ? p.value.toFixed(3) : '' },
    { field: 'group_id', headerName: 'Group' },
    { field: 'note', headerName: 'Notes', minWidth: 200, flex: 1,
      editable: true, cellClass: 'notes-cell',
      cellEditor: 'agLargeTextCellEditor',
      cellEditorParams: { maxLength: 500, rows: 3 },
      suppressAutoSize: true },
  ];

  const dailyCols = [
    { field: 'date', headerName: 'Date', sort: 'asc' },
    { field: 'day', headerName: 'Day' },
    { field: 'num_trades', headerName: 'Trades' },
    { field: 'wins', headerName: 'Wins',
      cellClass: p => p.value > 0 ? 'cell-win' : '' },
    { field: 'losses', headerName: 'Losses',
      cellClass: p => p.value > 0 ? 'cell-loss' : '' },
    { field: 'win_rate', headerName: 'Win Rate',
      valueFormatter: p => p.value != null ? p.value + '%' : '',
      cellClass: p => p.value >= 50 ? 'cell-win' : p.value != null ? 'cell-loss' : '' },
    { field: 'puts', headerName: 'Puts' },
    { field: 'calls', headerName: 'Calls' },
    { field: 'pl', headerName: 'P/L ($)',
      cellClass: p => p.value > 0 ? 'cell-win' : p.value < 0 ? 'cell-loss' : 'cell-be',
      valueFormatter: p => plStr(p.value) },
    { field: 'cumulative_pl', headerName: 'Cumulative',
      cellClass: p => p.value >= 0 ? 'cell-win' : 'cell-loss',
      valueFormatter: p => plStr(p.value) },
    { field: 'total_risk', headerName: 'Total Risk',
      valueFormatter: p => p.value != null ? '$' + p.value.toLocaleString() : '' },
    { field: 'avg_pl', headerName: 'Avg P/L',
      cellClass: p => p.value > 0 ? 'cell-win' : p.value < 0 ? 'cell-loss' : '',
      valueFormatter: p => plStr(p.value) },
    { field: 'best_trade', headerName: 'Best Trade',
      cellClass: 'cell-win',
      valueFormatter: p => plStr(p.value) },
    { field: 'worst_trade', headerName: 'Worst Trade',
      cellClass: 'cell-loss',
      valueFormatter: p => plStr(p.value) },
    { field: 'vix', headerName: 'VIX' },
  ];

  // --- Build daily aggregates ---
  function buildDaily(trades) {
    const byDate = {};
    trades.forEach(t => {
      const d = t.date;
      if (!byDate[d]) byDate[d] = {
        date: d, day: t.day, num_trades: 0, wins: 0, losses: 0,
        puts: 0, calls: 0, pl: 0, total_risk: 0, vix: t.vix,
        best_trade: -Infinity, worst_trade: Infinity, pls: []
      };
      const row = byDate[d];
      row.num_trades++;
      if (t.wl === 'WIN') row.wins++;
      if (t.wl === 'LOSS') row.losses++;
      if (t.type === 'Put') row.puts++; else row.calls++;
      row.pl += (t.pl || 0);
      row.total_risk += (t.risk || 0);
      row.best_trade = Math.max(row.best_trade, t.pl || 0);
      row.worst_trade = Math.min(row.worst_trade, t.pl || 0);
    });
    const dates = Object.keys(byDate).sort();
    let cum = 0;
    return dates.map(d => {
      const row = byDate[d];
      row.pl = Math.round(row.pl);
      row.total_risk = Math.round(row.total_risk);
      row.avg_pl = Math.round(row.pl / row.num_trades);
      row.win_rate = row.wins + row.losses > 0
        ? Math.round(row.wins / (row.wins + row.losses) * 100) : null;
      row.best_trade = row.best_trade === -Infinity ? 0 : Math.round(row.best_trade);
      row.worst_trade = row.worst_trade === Infinity ? 0 : Math.round(row.worst_trade);
      cum += row.pl;
      row.cumulative_pl = cum;
      return row;
    });
  }

  // --- Grid setup ---
  let currentMode = 'trades';
  let gridApi;

  const gridOptions = {
    columnDefs: tradeCols,
    rowData: allTrades.filter(t => (t.symbol || '').toUpperCase() === 'SPY'),
    defaultColDef: {
      sortable: true,
      filter: true,
      resizable: true,
    },
    animateRows: true,
    getRowStyle: params => {
      if (currentMode === 'trades') {
        if (params.data.wl === 'WIN') return { background: 'rgba(74,222,128,0.04)' };
        if (params.data.wl === 'LOSS') return { background: 'rgba(248,113,113,0.04)' };
      } else {
        if (params.data.pl > 0) return { background: 'rgba(74,222,128,0.04)' };
        if (params.data.pl < 0) return { background: 'rgba(248,113,113,0.04)' };
      }
      return null;
    },
    onCellValueChanged: async (event) => {
      if (event.colDef.field === 'note') {
        const groupId = event.data.group_id;
        const note = event.newValue || '';
        try {
          await apiFetch('/api/notes', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ group_id: groupId, note })
          });
        } catch (e) {
          console.error('Failed to save note:', e);
        }
      }
    },
    onFirstDataRendered: () => autofit(),
  };

  const gridDiv = document.getElementById('log-grid');
  gridApi = agGrid.createGrid(gridDiv, gridOptions);

  function autofit() {
    const colIds = gridApi.getColumns()
      .filter(c => c.getColId() !== 'note')
      .map(c => c.getColId());
    gridApi.autoSizeColumns(colIds);
  }

  // --- Get filtered trades based on symbol dropdown ---
  function getFilteredTrades() {
    const val = document.getElementById('log-filter').value;
    if (val === 'OTHER') return allTrades.filter(t => (t.symbol || '').toUpperCase() !== 'SPY');
    if (val) return allTrades.filter(t => (t.symbol || '').toUpperCase() === val);
    return allTrades;
  }

  // --- Refresh grid data for current mode + filter ---
  function refreshGrid() {
    const filtered = getFilteredTrades();
    if (currentMode === 'trades') {
      gridApi.setGridOption('columnDefs', tradeCols);
      gridApi.setGridOption('rowData', filtered);
    } else {
      gridApi.setGridOption('columnDefs', dailyCols);
      gridApi.setGridOption('rowData', buildDaily(filtered));
    }
    setTimeout(() => { autofit(); updateSummary(); }, 50);
  }

  function updateSummary() {
    const rows = [];
    gridApi.forEachNodeAfterFilter(node => rows.push(node.data));

    const plStr2 = v => v >= 0 ? '+$' + Math.abs(v).toLocaleString() : '-$' + Math.abs(v).toLocaleString();

    if (currentMode === 'daily') {
      const totalPL = rows.reduce((s, d) => s + d.pl, 0);
      const greenDays = rows.filter(d => d.pl > 0).length;
      const totalTrades = rows.reduce((s, d) => s + d.num_trades, 0);
      const avgDaily = rows.length > 0 ? Math.round(totalPL / rows.length) : 0;
      document.getElementById('log-summary').innerHTML =
        `<span>Days:<span class="val">${rows.length}</span></span>` +
        `<span>Total Trades:<span class="val">${totalTrades}</span></span>` +
        `<span>Total P/L:<span class="val ${totalPL >= 0 ? 'g' : 'r'}">${plStr2(Math.round(totalPL))}</span></span>` +
        `<span>Green Days:<span class="val g">${greenDays}</span></span>` +
        `<span>Red Days:<span class="val r">${rows.length - greenDays}</span></span>` +
        `<span>Avg Daily P/L:<span class="val ${avgDaily >= 0 ? 'g' : 'r'}">${plStr2(avgDaily)}</span></span>`;
    } else {
      const totalPL = rows.reduce((s, t) => s + (t.pl || 0), 0);
      const wins = rows.filter(t => t.wl === 'WIN').length;
      const losses = rows.filter(t => t.wl === 'LOSS').length;
      const wr = wins + losses > 0 ? (wins / (wins + losses) * 100).toFixed(1) : '0';
      const winPLs = rows.filter(t => t.wl === 'WIN').map(t => t.pl || 0);
      const lossPLs = rows.filter(t => t.wl === 'LOSS').map(t => t.pl || 0);
      const avgWin = winPLs.length ? Math.round(winPLs.reduce((a, b) => a + b, 0) / winPLs.length) : 0;
      const avgLoss = lossPLs.length ? Math.round(lossPLs.reduce((a, b) => a + b, 0) / lossPLs.length) : 0;
      document.getElementById('log-summary').innerHTML =
        `<span>Trades:<span class="val">${rows.length}</span></span>` +
        `<span>Total P/L:<span class="val ${totalPL >= 0 ? 'g' : 'r'}">${plStr2(Math.round(totalPL))}</span></span>` +
        `<span>Win Rate:<span class="val">${wr}%</span></span>` +
        `<span>Avg Win:<span class="val g">${plStr2(avgWin)}</span></span>` +
        `<span>Avg Loss:<span class="val r">${plStr2(avgLoss)}</span></span>`;
    }
  }

  // --- View mode toggle ---
  document.querySelectorAll('#log-view-tabs .tab').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('#log-view-tabs .tab').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      currentMode = t.dataset.mode;
      refreshGrid();
    });
  });

  // --- Symbol filter ---
  document.getElementById('log-filter').addEventListener('change', () => refreshGrid());

  // --- Quick search ---
  const search = document.getElementById('log-search');
  search.addEventListener('input', () => {
    gridApi.setGridOption('quickFilterText', search.value);
    updateSummary();
  });

  // Listen for ag-Grid filter changes
  gridApi.addEventListener('filterChanged', updateSummary);

  // Initial summary
  setTimeout(updateSummary, 100);
})();
</script>
